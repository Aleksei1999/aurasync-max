<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиент для фона -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8E0D4"/>
      <stop offset="50%" style="stop-color:#F5CEB8"/>
      <stop offset="100%" style="stop-color:#D4C5E2"/>
    </linearGradient>
    <!-- Тень -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Фон с закруглёнными углами -->
  <rect x="50" y="50" width="400" height="400" rx="80" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Иконка Sparkles (звёздочки) -->
  <g transform="translate(250, 250)" fill="white">
    <!-- Большая звезда по центру -->
    <path d="M0 -80 L12 -12 L80 0 L12 12 L0 80 L-12 12 L-80 0 L-12 -12 Z" fill="white"/>

    <!-- Маленькая звезда справа сверху -->
    <g transform="translate(70, -60)">
      <path d="M0 -25 L4 -4 L25 0 L4 4 L0 25 L-4 4 L-25 0 L-4 -4 Z" fill="white" opacity="0.9"/>
    </g>

    <!-- Маленькая звезда слева снизу -->
    <g transform="translate(-65, 55)">
      <path d="M0 -20 L3 -3 L20 0 L3 3 L0 20 L-3 3 L-20 0 L-3 -3 Z" fill="white" opacity="0.8"/>
    </g>
  </g>
</svg>
